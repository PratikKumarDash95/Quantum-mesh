name: Docker build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - discovery-service
          - auth-service
          - gateway-service
          - monitoring-service
          - analytics-service
          - notification-service
          - ai-engine
          - frontend-dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        if: matrix.service != 'ai-engine' && matrix.service != 'frontend-dashboard'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Package Java service
        if: matrix.service != 'ai-engine' && matrix.service != 'frontend-dashboard'
        run: mvn -B -ntp -pl ${{ matrix.service }} -am package -DskipTests

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:latest
            ghcr.io/${{ steps.repo.outputs.name }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
