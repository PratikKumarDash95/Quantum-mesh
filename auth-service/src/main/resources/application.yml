server:
  port: 8081

spring:
  application:
    name: auth-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    hikari:
      pool-name: auth-write-pool
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
    # Read-replica pool. Defaults to the primary URL so the bean wires up
    # without requiring a real replica in dev. Override DB_REPLICA_URL when a
    # genuine read replica is available. See DataSourceConfig.java.
    replica:
      url: ${DB_REPLICA_URL:${DB_URL:jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1}}
      username: ${DB_REPLICA_USER:${DB_USER:sa}}
      password: ${DB_REPLICA_PASSWORD:${DB_PASSWORD:}}
      driver-class-name: ${DB_DRIVER:org.h2.Driver}
      hikari:
        pool-name: auth-read-pool
        maximum-pool-size: ${DB_REPLICA_POOL_MAX:20}
        minimum-idle: ${DB_REPLICA_POOL_MIN_IDLE:2}
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
        read-only: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2
  flyway:
    enabled: false

quantummesh:
  jwt:
    secret: ${JWT_SECRET:change-me-please-use-a-long-random-secret-key-32bytes-min}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-ttl-days: ${REFRESH_TTL_DAYS:7}
    issuer: quantummesh-auth

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,flyway
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quantummesh}
    username: ${DB_USER:quantummesh}
    password: ${DB_PASSWORD:quantummesh}
    driver-class-name: org.postgresql.Driver
    replica:
      url: ${DB_REPLICA_URL:${DB_URL:jdbc:postgresql://localhost:5432/quantummesh}}
      username: ${DB_REPLICA_USER:${DB_USER:quantummesh}}
      password: ${DB_REPLICA_PASSWORD:${DB_PASSWORD:quantummesh}}
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

